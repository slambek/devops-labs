events { 
    worker_connections 1024; 
}

http {
    server {
        listen 80;
        listen 443 ssl; # Enable SSL/TLS processing on port 443
        server_name localhost;

        # Paths to certificate and key files inside the container
        ssl_certificate /etc/nginx/certs/nginx.crt;     # Public certificate (Passport)
        ssl_certificate_key /etc/nginx/certs/nginx.key; # Private key (Seal)

        # Allow only modern and secure TLS versions
        ssl_protocols TLSv1.2 TLSv1.3; 

        location / {
            add_header Content-Type text/plain;
            return 200 'HTTPS works perfectly!\n';
        }
    }
}

services:
  image-backend:
    image: nginx:alpine
    container_name: image-service
    command: >
      /bin/sh -c "echo '<h1>[L7 App] Welcome to the Image Gallery!</h1>' > /usr/share/nginx/html/index.html && nginx -g 'daemon off;'"

  api-backend:
    image: nginx:alpine
    container_name: api-service
    command: >
      /bin/sh -c "echo '{\"status\": \"success\", \"message\": \"[L7 App] Hello from API!\"}' > /usr/share/nginx/html/index.html && nginx -g 'daemon off;'"

  smart-balancer:
    image: nginx:alpine
    container_name: smart-balancer
    ports:
      - "8080:80"   
      - "9090:9090" 
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - image-backend
      - api-backend

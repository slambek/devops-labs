events { 
    worker_connections 1024; 
}

# ---- LAYER 4 LOAD BALANCING (TCP/UDP) ----
stream {
    upstream l4_backend {
        server image-service:80;
    }

    server {
        listen 9090;
        # Blindly forward raw TCP traffic to the image service
        proxy_pass l4_backend;
    }
}

# ---- LAYER 7 LOAD BALANCING (HTTP) ----
http {
    upstream image_servers { server image-service:80; }
    upstream api_servers   { server api-service:80; }

    server {
        listen 80;

        # Route requests based on URI path
        location /images {
            # Strip /images prefix before forwarding to backend
            rewrite ^/images(.*) / break;
            proxy_pass http://image_servers;
        }

        location /api {
            # Strip /api prefix before forwarding to backend
            rewrite ^/api(.*) / break;
            proxy_pass http://api_servers;
        }
    }
}
